name: Fetch and Format Intervals Data

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2025-07-01'
      end_date:
        description: 'End date (YYYY-MM-DD) - Leeg laten voor vandaag'
        required: false
        default: ''

jobs:
  fetch_and_process:
    runs-on: ubuntu-latest

    env:
      INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
      INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
      INTERVALS_BASE_URL: ${{ secrets.INTERVALS_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas

      - name: Run fetch_intervals.py
        run: |
          # We vangen de input op; als deze leeg is, geven we de vlag niet mee aan het script
          if [ -z "${{ inputs.end_date }}" ]; then
            python fetch_intervals.py --start "${{ inputs.start_date }}" --out-dir data
          else
            python fetch_intervals.py --start "${{ inputs.start_date }}" --end "${{ inputs.end_date }}" --out-dir data
          fi

      - name: Process and Format Data
        run: python process_data.py

      - name: Upload Only Formatted Activities
        uses: actions/upload-artifact@v4
        with:
          name: activities-export-${{ inputs.start_date }}
          path: data/activities_formatted.csv
